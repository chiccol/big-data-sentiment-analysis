conf = { 'bootstrap.servers': 'kafka:9092', 'group.id': 'your_group', 'auto.offset.reset': 'earliest'}
consumer = Consumer(conf)
msg = consumer.poll(timeout=5.0)
        # Print message details
        print(f"Topic: {msg.topic()}")
        print(f"Partition: {msg.partition()}")
        print(f"Offset: {msg.offset()}")
        print(f"Key: {msg.key().decode('utf-8') if msg.key() else None}")
        print(f"Value: {msg.value().decode('utf-8')}")
        print(f"Timestamp: {msg.timestamp()[1]}")

