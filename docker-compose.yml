services:  
  zookeeper:  #Zookeeper, a distributed coordination service used by Kafka.
    image: wurstmeister/zookeeper  
    container_name: zookeeper  
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  kafka: 
    image: wurstmeister/kafka
    container_name: kafka  
    ports:
      - "9092:9092"     # External port for communication with clients
      - "29092:29092"   # Internal port for Kafka brokers
    environment:  # Defines environment variables that will be set inside the Kafka container.
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181  # Specifies the address (host:port) of the Zookeeper service that Kafka will connect to. (it connects to the 'zookeeper' service running on port 2181 within the Docker Compose network)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092, EXTERNAL://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT, EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092, EXTERNAL://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server=localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  kafdrop:  # Kafka UI for monitoring topics and messages.
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    ports:
      - "9000:9000"  # Exposes the Kafka UI on port 9000.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
  
  youtube-producer:
    container_name: youtube-producer
    build:
      context: data/data_source/
      dockerfile: youtube/youtube.Dockerfile
    environment:
      - KAFKA_ADVERTISED_LISTENERS=kafka:9092
    depends_on:
      - kafka
    volumes: 
      - ./data/data_source/youtube/main.py:/app/main.py 
      - ./data/data_source/youtube/youtube.py:/app/youtube.py

  trustpilot-producer:
    container_name: trustpilot-producer
    build:
      context: data/data_source/
      dockerfile: trustpilot/trustpilot.Dockerfile
    environment:
      - KAFKA_ADVERTISED_LISTENERS=kafka:9092
    depends_on:
      - kafka
    volumes: 
      - ./data/data_source/trustpilot/main.py:/app/main.py 
      - ./data/data_source/trustpilot/trustpilot.py:/app/trustpilot.py 
      
  reddit-producer:
    container_name: reddit-producer
    build:
      context: data/data_source/
      dockerfile: reddit/reddit.Dockerfile
    depends_on:
      - kafka
  
  pseudo-producer:
    container_name: pseudo-producer
    build:
      context: data/data_source/
      dockerfile: pseudo/pseudo.Dockerfile
    depends_on:
      - kafka
    volumes:
      - ./data/data_source/pseudo/main.py:/app/main.py
      - ./data/data_source/pseudo/pseudo.py:/app/pseudo.py
  
  spark-master:
    build:
        context: consumers
        dockerfile: spark/Dockerfile
    command: /bin/bash -c "./run_spark_job.sh"
    mem_limit: 2g
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      #- SPARK_DYNAMIC_ALLOCATION_ENABLED=true
      - SPARK_MASTER_PORT=7077
      - KAFKA_ADVERTISED_LISTENERS=kafka:9092
      - CLIENT_ID=spark_consumer
      - GROUP_ID=spark_group
      - NVIDIA_VISIBLE_DEVICES=0 # only use GPU 0
      - BATCH_SIZE=64 # it should be able to handle larger batch sizes, but didn't test it. So far 8192 was the biggest I managed
      - MONGO_URI=mongodb://mongo:27017/reviews.
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/warehouse
      - POSTGRES_USER=admin
      - POSTGRES_PWD=password
      - POSTGRES_DRIVER=org.postgresql.Driver
    ports:
      - "7077:7077" # Master port
      - "8080:8080" # Web UI
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/applications || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    runtime: nvidia 
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # allows access to GPU resources
    volumes: 
      - ./consumers/spark/main.py:/app/main.py 
      - ./consumers/kafka_consumer.py:/app/kafka_consumer.py
      - ./consumers/spark/utils.py:/app/utils.py
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  spark-worker-1:
    build:
        context: consumers
        dockerfile: spark/Dockerfile
    mem_limit: 2g
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      #- SPARK_DYNAMIC_ALLOCATION_ENABLED=true # controls how many executors to request but operates within the worker resource limits
      - SPARK_WORKER_CORES=2 
      - SPARK_WORKER_MEMORY=2g # resource limit per worker
      - NVIDIA_VISIBLE_DEVICES=0 # only use GPU 0
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    depends_on:
      - spark-master
  
  mongo:
    image: mongo:6.0.5
    container_name: mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ ping: 1 })'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always
  
  mongo-express:
    image: mongo-express:1.0.0-alpha
    container_name: mongo-express
    ports:
      - "8081:8081"  # Exposes the Mongo Express web interface on port 8081.
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
    depends_on:
      - mongo
  
  postgres:
    image: postgres:17.0
    container_name: postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=warehouse
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./warehouse/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com  # Default login email for pgAdmin
      - PGADMIN_DEFAULT_PASSWORD=password # Default login password for pgAdmin
    ports:
      - "5050:80"  # Expose pgAdmin on port 5050
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    container_name: fastapi-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/warehouse
      - MONGO_URL=mongodb://mongo:27017

  frontend:
    container_name: react-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"  
    depends_on:
      - backend    

  rag:
    container_name: rag
    build:
      context: rag
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - MONGO_URI=mongodb://mongo:27017
    volumes:
      - ./rag/main.py:/app/main.py
